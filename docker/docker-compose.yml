services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "${API_PORT:-8000}:8000"
    command: >
      sh -c "alembic upgrade head && python main.py"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:11434/api/tags >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30

  ollama-init:
    image: curlimages/curl:8.12.1
    env_file:
      - ../.env
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    command: >
      sh -c '
        set -eu;
        pull_url="${OLLAMA_PULL_BASE_URL:-http://ollama:11434}";
        until curl -fsS "$pull_url/api/tags" >/dev/null; do sleep 2; done;
        curl -fsS "$pull_url/api/pull" -H "Content-Type: application/json" -d "{\"name\":\"$OLLAMA_MODEL\",\"stream\":false}";
        curl -fsS "$pull_url/api/pull" -H "Content-Type: application/json" -d "{\"name\":\"$OLLAMA_EMBEDDING_MODEL\",\"stream\":false}";
      '

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "${GRAFANA_PORT:-3000}:3000"

  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"

volumes:
  pgdata:
  ollama:
